<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>야간자율학습 출석 시스템</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900">
  
  <div id="root"></div>

  <script type="text/babel">
    // ⭐ [고정 연동 주소]
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyO9_bTUP1Q0xAt4D2pIv9aTAk0hmGdKyeMwdIy4wPErVkVnqP-bVQjruo8Cm7rnT-U/exec";
    // ⭐ [관리자 비밀번호]
    const ADMIN_PASSWORD = "1234";

    const { useState, useEffect, useRef } = React;

    function App() {
      const [isAdmin, setIsAdmin] = useState(false);
      const [showLoginModal, setShowLoginModal] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [loginError, setLoginError] = useState('');
      const [activeTab, setActiveTab] = useState('scanner');
      const [scannerReady, setScannerReady] = useState(false);
      
      const [students, setStudents] = useState(() => {
        const saved = localStorage.getItem('yaja_students');
        return saved ? JSON.parse(saved) : [{ id: '10101', name: '김철수' }, { id: '10102', name: '이영희' }];
      });
      const [logs, setLogs] = useState(() => {
        const saved = localStorage.getItem('yaja_logs');
        if (saved) {
          return JSON.parse(saved).map(log => ({ ...log, timestamp: new Date(log.timestamp) }));
        }
        return [];
      });
      const [scanMessage, setScanMessage] = useState(null);
      
      useEffect(() => { localStorage.setItem('yaja_students', JSON.stringify(students)); }, [students]);
      useEffect(() => { localStorage.setItem('yaja_logs', JSON.stringify(logs)); }, [logs]);

      useEffect(() => {
        setScannerReady(true);
      }, []);

      // --- 1. 스캐너 컴포넌트 ---
      const ScannerView = () => {
        const lastScannedRef = useRef(null);
        const html5QrCodeRef = useRef(null);
        const isScanningRef = useRef(false); 
        
        const [cameras, setCameras] = useState([]);
        const [selectedCameraId, setSelectedCameraId] = useState('environment'); 
        const [isScanning, setIsScanning] = useState(false);
        const [cameraError, setCameraError] = useState('');

        const playBeep = () => {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime);
            osc.start();
            osc.stop(ctx.currentTime + 0.1);
          } catch (e) {
            console.log("오디오 재생 미지원 기기");
          }
        };

        useEffect(() => {
          // 🚨 수정됨: 페이지 접속 시 카메라 권한을 묻는 코드를 제거했습니다. (관리자 로그인 방해 방지)
          return () => {
            if (html5QrCodeRef.current && isScanningRef.current) {
              html5QrCodeRef.current.stop().then(() => {
                if (html5QrCodeRef.current) html5QrCodeRef.current.clear();
              }).catch(console.error);
            }
          };
        }, []);

        const startScanning = () => {
          setCameraError('');
          
          if (!html5QrCodeRef.current) {
            html5QrCodeRef.current = new window.Html5Qrcode("qr-reader");
          }

          const cameraConfig = (selectedCameraId === 'environment' || selectedCameraId === 'user') 
            ? { facingMode: selectedCameraId } 
            : selectedCameraId;

          html5QrCodeRef.current.start(
            cameraConfig,
            {
              fps: 10,
              qrbox: function(viewfinderWidth, viewfinderHeight) {
                let minEdgePercentage = 0.7;
                let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                let size = Math.floor(minEdgeSize * minEdgePercentage);
                if (size < 50) size = 50; 
                return { width: size, height: size };
              },
              aspectRatio: 1.0
            },
            (decodedText) => {
              const now = Date.now();
              const last = lastScannedRef.current;
              if (last && last.text === decodedText && (now - last.time < 3000)) return; 
              lastScannedRef.current = { text: decodedText, time: now };

              try {
                const [studentId, studentName] = decodedText.split('|');
                if (!studentId || !studentName) {
                  showScanMessage('error', '본 시스템용 출석 QR코드가 아닙니다.');
                  return;
                }
                playBeep();
                handleAttendance(studentId, studentName);
              } catch {
                showScanMessage('error', '잘못된 형식의 QR 코드입니다.');
              }
            },
            (errorMessage) => {}
          ).then(() => {
            setIsScanning(true);
            isScanningRef.current = true;
            
            // 🚨 수정됨: 카메라가 정상적으로 켜진 '이후에만' 카메라 목록을 불러와서 세팅합니다. (오류 방지)
            window.Html5Qrcode.getCameras().then(devices => {
              if (devices && devices.length) setCameras(devices);
            }).catch(e => console.log(e));

          }).catch((err) => {
            console.error("카메라 시작 에러:", err);
            setCameraError(`카메라 실행 실패: 브라우저 설정에서 카메라 '허용'이 되어있는지 확인해주세요.`);
            setIsScanning(false);
            isScanningRef.current = false;
          });
        };

        const stopScanning = () => {
          if (html5QrCodeRef.current && isScanningRef.current) {
            html5QrCodeRef.current.stop().then(() => {
              setIsScanning(false);
              isScanningRef.current = false;
              if (html5QrCodeRef.current) html5QrCodeRef.current.clear(); 
            }).catch(console.error);
          }
        };

        const handleCameraChange = (e) => {
          setSelectedCameraId(e.target.value);
        };

        const handleAttendance = (id, name) => {
          const now = new Date();
          const timeString = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          
          setLogs(prevLogs => {
            const todayLogs = prevLogs.filter(log => log.id === id && log.timestamp.toDateString() === now.toDateString());
            const latestLog = todayLogs.length > 0 ? todayLogs[0] : null;
            const actionType = (latestLog && latestLog.type === '입실') ? '퇴실' : '입실';

            const newLog = { logId: Date.now().toString(), timestamp: now, id, name, type: actionType, timeString };

            if (GOOGLE_SHEET_URL) {
              const url = `${GOOGLE_SHEET_URL}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&type=${encodeURIComponent(actionType)}`;
              fetch(url, { mode: 'no-cors' }).catch(err => console.error('구글시트 전송 실패', err));
            }

            showScanMessage(actionType === '입실' ? 'success' : 'info', `[${actionType}] ${id} ${name} (${timeString})`);
            return [newLog, ...prevLogs];
          });
        };

        const showScanMessage = (type, text) => {
          setScanMessage({ type, text });
          setTimeout(() => setScanMessage(null), 3000);
        };

        return (
          <div className="flex flex-col items-center justify-center space-y-4">
            <h2 className="text-xl font-bold text-gray-800 mb-2">QR 출석 스캐너</h2>
            
            <div className="w-full max-w-md bg-white p-4 rounded-lg shadow-sm border border-gray-200 space-y-3 relative z-10">
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1">장치 카메라 선택</label>
                <select 
                  value={selectedCameraId} 
                  onChange={handleCameraChange}
                  className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500 bg-gray-50"
                  disabled={isScanning}
                >
                  <option value="environment">자동 선택 (후면 카메라 권장)</option>
                  <option value="user">자동 선택 (전면/노트북 웹캠)</option>
                  {cameras.map(cam => (
                    <option key={cam.id} value={cam.id}>{cam.label || `카메라 ${cam.id.substring(0, 5)}...`}</option>
                  ))}
                </select>
                {isScanning && <p className="text-xs text-gray-400 mt-1">* 카메라를 변경하려면 먼저 [카메라 끄기]를 눌러주세요.</p>}
              </div>
              
              <div className="flex gap-2">
                {!isScanning ? (
                  <button onClick={startScanning} className="flex-1 bg-indigo-600 text-white py-3 rounded font-bold hover:bg-indigo-700 transition shadow-sm">
                    카메라 켜기 (스캔 시작)
                  </button>
                ) : (
                  <button onClick={stopScanning} className="flex-1 bg-red-500 text-white py-3 rounded font-bold hover:bg-red-600 transition shadow-sm">
                    카메라 끄기 (오류 방지)
                  </button>
                )}
              </div>
              {cameraError && (
                <div className="bg-red-50 border border-red-200 p-3 rounded mt-2">
                  <p className="text-red-600 text-sm font-bold text-center break-words">{cameraError}</p>
                </div>
              )}
            </div>

            {scanMessage && (
              <div className={`px-6 py-4 rounded-lg shadow-lg text-white font-bold text-lg animate-bounce w-full max-w-md text-center z-50 ${
                scanMessage.type === 'success' ? 'bg-green-500' : scanMessage.type === 'info' ? 'bg-blue-500' : 'bg-red-500'
              }`}>
                {scanMessage.text}
              </div>
            )}
            
            <div className="relative w-full max-w-md overflow-hidden rounded-lg shadow-md bg-white border-2 border-gray-200 min-h-[300px] flex items-center justify-center">
              <div id="qr-reader" className="w-full"></div>
              
              {!isScanning && (
                <div className="absolute inset-0 flex flex-col items-center justify-center bg-gray-50 text-gray-400 p-6 text-center z-10 pointer-events-none">
                  <span className="text-4xl mb-2">📷</span>
                  <p>위의 <strong>[카메라 켜기]</strong> 버튼을 누르면<br/>렌즈가 작동합니다.</p>
                </div>
              )}
            </div>
            
            {GOOGLE_SHEET_URL ? (
              <p className="text-green-600 font-medium flex items-center"><span className="mr-1">☁️</span> 구글 시트와 실시간 연동 중입니다.</p>
            ) : (
              <p className="text-red-500 font-medium text-sm">※ 코드에 구글 시트 주소가 입력되지 않았습니다.</p>
            )}
          </div>
        );
      };

      // --- 2. 출석 기록 및 엑셀 다운로드 ---
      const AttendanceLogView = () => {
        const [filterDate, setFilterDate] = useState('');
        const [filterGrade, setFilterGrade] = useState('all');
        const [filterClass, setFilterClass] = useState('all');
        const [searchQuery, setSearchQuery] = useState('');
        const [cloudLogs, setCloudLogs] = useState([]);
        const [isFetching, setIsFetching] = useState(false);

        const fetchLogsFromCloud = async () => {
          if (!GOOGLE_SHEET_URL) return;
          setIsFetching(true);
          try {
            const res = await fetch(`${GOOGLE_SHEET_URL}?action=getLogs`);
            const text = await res.text();
            if (text === "성공") throw new Error("앱스 스크립트가 구버전입니다.");
            const data = JSON.parse(text);
            setCloudLogs(data);
          } catch (e) {
            console.error("Fetch error:", e);
            alert("구글 시트 연동 오류: 앱스 스크립트 코드가 최신인지 확인해주세요.");
          } finally {
            setIsFetching(false);
          }
        };

        useEffect(() => {
          if (GOOGLE_SHEET_URL) fetchLogsFromCloud();
        }, []);

        const normalizedLogs = GOOGLE_SHEET_URL ? cloudLogs : logs.map(l => ({
           logId: l.logId,
           date: `${l.timestamp.getFullYear()}-${String(l.timestamp.getMonth() + 1).padStart(2, '0')}-${String(l.timestamp.getDate()).padStart(2, '0')}`,
           time: l.timeString,
           id: l.id,
           name: l.name,
           type: l.type
        }));

        const filteredLogs = normalizedLogs.filter(log => {
          if (filterDate && log.date !== filterDate) return false;
          let grade = '', classNum = '';
          if (log.id && log.id.length >= 4) {
             grade = log.id.substring(0, 1);
             classNum = parseInt(log.id.substring(1, 3), 10).toString();
          }
          if (filterGrade !== 'all' && grade !== filterGrade) return false;
          if (filterClass !== 'all' && classNum !== filterClass) return false;
          if (searchQuery && !log.name.includes(searchQuery) && !log.id.includes(searchQuery)) return false;
          return true;
        });

        const exportToCSV = () => {
          if (filteredLogs.length === 0) return alert('다운로드할 기록이 없습니다.');
          const headers = ['날짜', '시간', '학번', '이름', '상태'];
          const csvRows = filteredLogs.map(log => `${log.date},${log.time},${log.id},${log.name},${log.type}`);
          const csvContent = "\ufeff" + [headers.join(','), ...csvRows].join('\n');
          const link = document.createElement('a');
          link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
          link.download = `야자출석기록_${filterDate || new Date().toLocaleDateString('ko-KR').replace(/\. /g, '').replace(/\./g, '')}.csv`;
          link.click();
        };

        return (
          <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div className="p-4 bg-gray-50 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <h2 className="text-lg font-bold text-gray-800 flex items-center">
                <span className="text-xl mr-2">🕒</span> 
                {GOOGLE_SHEET_URL ? '클라우드 연동 출석 기록' : '기기 자체 출석 기록'}
              </h2>
              <div className="flex gap-2 w-full md:w-auto">
                {GOOGLE_SHEET_URL && (
                  <button onClick={fetchLogsFromCloud} disabled={isFetching} className="flex items-center bg-blue-100 text-blue-700 px-4 py-2 rounded hover:bg-blue-200 transition font-medium text-sm shadow-sm">
                    <span className="mr-2">{isFetching ? '⏳' : '🔄'}</span> 새로고침
                  </button>
                )}
                <button onClick={exportToCSV} className="flex items-center bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition font-medium text-sm shadow-sm">
                  <span className="mr-2">📥</span> 엑셀 다운로드
                </button>
              </div>
            </div>
            
            <div className={`mx-4 mt-4 p-4 border rounded-lg text-sm leading-relaxed shadow-sm ${GOOGLE_SHEET_URL ? 'bg-green-50 border-green-200 text-green-800' : 'bg-blue-50 border-blue-200 text-blue-800'}`}>
              {GOOGLE_SHEET_URL ? (
                <><strong className="text-green-900 text-base">✅ 구글 시트 데이터 실시간 연동 중</strong><br />구글 시트에 기록된 모든 출석 데이터가 이곳에 표시됩니다.</>
              ) : (
                <><strong className="text-blue-900 text-base">💡 다른 기기에서는 목록이 안 보이시나요?</strong><br />코드 상단에 구글 시트 주소를 넣으면 전체 기록이 연동됩니다.</>
              )}
            </div>
            
            <div className="p-4 border-b border-gray-200 bg-white grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 mt-2">
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">📅</span> 날짜 선택</label>
                <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔽</span> 학년</label>
                <select value={filterGrade} onChange={e => setFilterGrade(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500">
                  <option value="all">전체 학년</option>
                  <option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔽</span> 반</label>
                <select value={filterClass} onChange={e => setFilterClass(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500">
                  <option value="all">전체 반</option>
                  {[...Array(15)].map((_, i) => <option key={i+1} value={String(i+1)}>{i+1}반</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔍</span> 학생 검색</label>
                <input type="text" placeholder="이름 또는 학번" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500" />
              </div>
            </div>

            <div className="bg-indigo-50 p-2 px-4 text-sm text-indigo-800 flex justify-between items-center border-b border-gray-200">
              <span>조회 결과: <strong>{filteredLogs.length}</strong>건</span>
              <button onClick={() => {setFilterDate(''); setFilterGrade('all'); setFilterClass('all'); setSearchQuery('');}} className="text-indigo-600 hover:text-indigo-800 hover:underline font-medium text-xs">필터 초기화</button>
            </div>
            
            <div className="overflow-x-auto max-h-[400px] overflow-y-auto">
              <table className="w-full text-left border-collapse">
                <thead className="sticky top-0 bg-gray-100 shadow-sm z-10">
                  <tr className="text-gray-600 text-sm uppercase tracking-wider">
                    <th className="p-4 border-b">시간</th><th className="p-4 border-b">학번</th><th className="p-4 border-b">이름</th><th className="p-4 border-b">상태</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredLogs.length === 0 ? (
                    <tr><td colSpan="4" className="p-8 text-center text-gray-500">조회된 기록이 없습니다.</td></tr>
                  ) : (
                    filteredLogs.map((log, idx) => (
                      <tr key={log.logId || idx} className="hover:bg-gray-50 border-b border-gray-100 transition">
                        <td className="p-4 text-gray-700 whitespace-nowrap">{log.date} {log.time}</td>
                        <td className="p-4 font-mono text-gray-600 whitespace-nowrap">{log.id}</td>
                        <td className="p-4 font-medium text-gray-900 whitespace-nowrap">{log.name}</td>
                        <td className="p-4 whitespace-nowrap">
                          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${log.type === '입실' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`}>
                            <span className="mr-1">{log.type === '입실' ? '✅' : '🏃'}</span> {log.type}
                          </span>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // --- 3. 학생 관리 ---
      const StudentManagementView = () => {
        const [newId, setNewId] = useState('');
        const [newName, setNewName] = useState('');
        const [isBulkMode, setIsBulkMode] = useState(false);
        const [bulkData, setBulkData] = useState('');

        const addStudent = (e) => {
          e.preventDefault();
          if (!newId || !newName) return;
          if (students.find(s => s.id === newId)) return alert('이미 존재하는 학번입니다.');
          setStudents([...students, { id: newId, name: newName }]);
          setNewId(''); setNewName('');
        };

        const handleBulkAdd = () => {
          if (!bulkData.trim()) return alert('데이터를 입력해주세요.');
          const lines = bulkData.split('\n');
          let newStudents = [...students];
          let addedCount = 0;
          let dupCount = 0;
          
          lines.forEach(line => {
            const parts = line.trim().split(/[\s\t,]+/);
            if (parts.length >= 2) {
              const id = parts[0];
              const name = parts[1];
              if (!newStudents.find(s => s.id === id)) {
                newStudents.push({ id, name });
                addedCount++;
              } else {
                dupCount++;
              }
            }
          });
          setStudents(newStudents);
          setBulkData('');
          alert(`${addedCount}명의 학생이 추가되었습니다. (중복 제외 ${dupCount}명)`);
          setIsBulkMode(false);
        };

        const removeStudent = (id) => setStudents(students.filter(s => s.id !== id));

        const exportQRsToCSV = () => {
          if (students.length === 0) return alert('등록된 학생이 없습니다.');
          const headers = ['학번', '이름', 'QR이미지(구글시트용)'];
          const csvRows = students.map(s => {
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(s.id + '|' + s.name)}`;
            return `${s.id},${s.name},=IMAGE("${url}")`;
          });
          const csvContent = "\ufeff" + [headers.join(','), ...csvRows].join('\n');
          const link = document.createElement('a');
          link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
          link.download = `학생_QR코드_명렬표.csv`;
          link.click();
        };

        const printQRs = () => {
          if (students.length === 0) return alert('등록된 학생이 없습니다.');
          const printWindow = window.open('', '_blank');
          let html = `<html><head><title>학생 QR 일괄 인쇄</title>
            <style>
              body { font-family: sans-serif; text-align: center; }
              .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 20px; }
              .card { border: 1px dashed #999; padding: 15px; page-break-inside: avoid; display: flex; flex-direction: column; align-items: center; justify-content: center; }
              img { width: 120px; height: 120px; margin-bottom: 10px; }
              h3 { margin: 0 0 5px 0; font-size: 18px; }
              p { margin: 0; font-size: 14px; color: #555; }
              @media print { .no-print { display: none; } }
            </style>
            </head><body>
            <div class="no-print" style="margin-bottom: 20px;">
               <button onclick="window.print()" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #4f46e5; color: white; border: none; border-radius: 5px;">인쇄하기 / PDF 저장</button>
               <p style="margin-top: 10px; color: #666;">※ 프린터 설정에서 '배경 그래픽 인쇄'를 켜주세요.</p>
            </div>
            <div class="grid">`;
          students.forEach(s => {
            const url = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(s.id + '|' + s.name)}`;
            html += `<div class="card"><img src="${url}" /><h3>${s.name}</h3><p>${s.id}</p></div>`;
          });
          html += '</div></body></html>';
          printWindow.document.write(html);
          printWindow.document.close();
        };

        return (
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold text-gray-800 flex items-center">
                  <span className="text-xl mr-2">👤</span> 
                  {isBulkMode ? '학생 일괄 등록' : '개별 학생 등록'}
                </h2>
                <button 
                  onClick={() => setIsBulkMode(!isBulkMode)}
                  className="text-sm font-medium text-indigo-600 hover:text-indigo-800 underline"
                >
                  {isBulkMode ? '개별 등록으로 전환' : '일괄 등록으로 전환'}
                </button>
              </div>
              
              {!isBulkMode ? (
                <form onSubmit={addStudent} className="flex gap-4">
                  <input type="text" placeholder="학번 (예: 10101)" value={newId} onChange={(e) => setNewId(e.target.value)} className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" />
                  <input type="text" placeholder="이름 (예: 홍길동)" value={newName} onChange={(e) => setNewName(e.target.value)} className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" />
                  <button type="submit" className="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-medium whitespace-nowrap">등록</button>
                </form>
              ) : (
                <div className="flex flex-col gap-3">
                  <div className="bg-gray-50 p-3 rounded text-sm text-gray-600 border border-gray-200">
                    <p>엑셀 명렬표에서 <strong>[학번]</strong>과 <strong>[이름]</strong> 열을 드래그해서 복사한 후 아래 빈칸에 붙여넣기 하세요.</p>
                  </div>
                  <textarea 
                    placeholder={"10101 홍길동\n10102 김철수"}
                    value={bulkData}
                    onChange={(e) => setBulkData(e.target.value)}
                    className="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 h-32 outline-none font-mono text-sm"
                  />
                  <button onClick={handleBulkAdd} className="bg-indigo-600 text-white px-6 py-3 rounded hover:bg-indigo-700 font-bold transition">
                    위 목록으로 일괄 등록하기
                  </button>
                </div>
              )}
            </div>

            <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                <h2 className="text-lg font-bold text-gray-800 flex items-center">
                  <span className="text-xl mr-2">🔲</span> 학생 QR 코드 목록 ({students.length}명)
                </h2>
                <div className="flex gap-2 w-full md:w-auto">
                  <button onClick={printQRs} className="flex-1 md:flex-none flex justify-center items-center bg-gray-800 text-white px-4 py-2 rounded hover:bg-gray-900 transition font-medium text-sm shadow-sm">
                    <span className="mr-2">🖨️</span> 일괄 인쇄
                  </button>
                  <button onClick={exportQRsToCSV} className="flex-1 md:flex-none flex justify-center items-center bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition font-medium text-sm shadow-sm">
                    <span className="mr-2">📥</span> 엑셀 다운로드
                  </button>
                </div>
              </div>
              
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                {students.map(student => (
                  <div key={student.id} className="border border-gray-200 rounded-lg p-4 flex flex-col items-center bg-gray-50 relative hover:shadow-md transition">
                    <button onClick={() => removeStudent(student.id)} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xs font-bold">삭제</button>
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`${student.id}|${student.name}`)}`} alt="QR" className="w-32 h-32 mb-3 bg-white p-2 border rounded shadow-sm" />
                    <p className="font-bold text-gray-800 text-lg">{student.name}</p>
                    <p className="text-gray-500 text-sm font-mono">{student.id}</p>
                  </div>
                ))}
              </div>
              {students.length === 0 && (
                <div className="text-center text-gray-500 py-10 bg-gray-50 border border-dashed rounded">등록된 학생이 없습니다.</div>
              )}
            </div>
          </div>
        );
      };

      const handleAdminToggle = () => {
        if (isAdmin) {
          setIsAdmin(false); 
          setActiveTab('scanner');
        } else {
          setShowLoginModal(true);
          setPasswordInput('');
          setLoginError('');
        }
      };

      const handleLoginSubmit = () => {
        if (passwordInput === ADMIN_PASSWORD) {
          setIsAdmin(true);
          setShowLoginModal(false);
          setPasswordInput('');
        } else {
          setLoginError('비밀번호가 일치하지 않습니다.');
        }
      };

      return (
        <div className="min-h-screen bg-gray-100 font-sans text-gray-900 pb-10">
          
          {showLoginModal && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-[100] px-4">
              <div className="bg-white p-6 rounded-lg shadow-xl w-full max-w-sm">
                <h3 className="text-lg font-bold mb-4 flex items-center">
                  <span className="text-xl mr-2">🔒</span> 교사 관리자 로그인
                </h3>
                <input 
                  type="password" 
                  value={passwordInput}
                  onChange={e => setPasswordInput(e.target.value)}
                  onKeyDown={e => e.key === 'Enter' && handleLoginSubmit()}
                  className="w-full p-3 border border-gray-300 rounded mb-2 focus:ring-2 focus:ring-indigo-500 outline-none"
                  placeholder="비밀번호 입력 (기본: 1234)"
                  autoFocus
                />
                {loginError && <p className="text-red-500 text-sm mb-4 font-bold">{loginError}</p>}
                <div className="flex justify-end gap-2 mt-4">
                  <button onClick={() => setShowLoginModal(false)} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded font-medium transition">
                    취소
                  </button>
                  <button onClick={handleLoginSubmit} className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-medium transition">
                    확인
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* 🚨 수정됨: z-50을 부여하여 어떤 상황에서도 타이틀 터치가 막히지 않도록 강제 적용 */}
          <header className={`relative z-50 text-white shadow-md transition-colors duration-300 ${isAdmin ? 'bg-green-700' : 'bg-indigo-600'}`}>
            <div className="max-w-5xl mx-auto px-4 py-6 flex items-center justify-between">
              <h1 
                className="text-2xl font-extrabold tracking-tight flex items-center cursor-pointer select-none w-full sm:w-auto" 
                onClick={handleAdminToggle}
              >
                <span className="text-3xl mr-3">{isAdmin ? '🔓' : '🔲'}</span> 
                야간자율학습 출석 시스템
              </h1>
              {!isAdmin && <p className="text-indigo-200 text-sm hidden sm:block">학생 스캔 전용 모드</p>}
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8 relative z-0">
            {isAdmin && (
              <nav className="w-full md:w-64 flex-shrink-0 space-y-2">
                {[
                  { id: 'scanner', icon: '📷', label: '출석 스캐너 (카메라)' },
                  { id: 'students', icon: '👥', label: '학생 관리 및 발급' },
                  { id: 'logs', icon: '🕒', label: '출석 기록 및 엑셀' }
                ].map((tab) => (
                  <button 
                    key={tab.id} onClick={() => setActiveTab(tab.id)}
                    className={`w-full flex items-center p-4 rounded-lg transition-colors font-medium ${activeTab === tab.id ? 'bg-green-100 text-green-800 shadow-sm' : 'text-gray-600 hover:bg-gray-200'}`}
                  >
                    <span className="text-xl mr-3">{tab.icon}</span> {tab.label}
                  </button>
                ))}
              </nav>
            )}
            
            <section className={`flex-1 transition-all ${!isAdmin ? 'max-w-xl mx-auto w-full' : ''}`}>
              {activeTab === 'scanner' && <ScannerView />}
              {activeTab === 'students' && isAdmin && <StudentManagementView />}
              {activeTab === 'logs' && isAdmin && <AttendanceLogView />}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
