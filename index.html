<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>야간자율학습 출석 시스템</title>
  
  <!-- 라이브러리 불러오기 (Tailwind, HTML5-QRCode, React, Babel) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 font-sans text-gray-900">
  
  <div id="root"></div>

  <!-- React 앱 코드 -->
  <script type="text/babel">
    // ⭐ [고정 연동 주소] 선생님의 구글 시트 웹앱 URL을 아래 따옴표 안에 붙여넣으세요!
    // 이렇게 해두면 어떤 기기에서 접속하든 매번 환경설정에서 입력할 필요가 없습니다.
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbyO9_bTUP1Q0xAt4D2pIv9aTAk0hmGdKyeMwdIy4wPErVkVnqP-bVQjruo8Cm7rnT-U/exec";

    const { useState, useEffect, useRef } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('scanner');
      const [scannerReady, setScannerReady] = useState(false);
      
      const [students, setStudents] = useState(() => {
        const saved = localStorage.getItem('yaja_students');
        return saved ? JSON.parse(saved) : [{ id: '10101', name: '김철수' }, { id: '10102', name: '이영희' }];
      });
      const [logs, setLogs] = useState(() => {
        const saved = localStorage.getItem('yaja_logs');
        if (saved) {
          return JSON.parse(saved).map(log => ({ ...log, timestamp: new Date(log.timestamp) }));
        }
        return [];
      });
      const [scanMessage, setScanMessage] = useState(null);
      const [webhookUrl, setWebhookUrl] = useState(() => {
        // 고정 주소가 있으면 그것을 최우선으로 사용하고, 없으면 기존 저장된 것을 불러옵니다.
        return GOOGLE_SHEET_URL || localStorage.getItem('yaja_webhook') || '';
      });

      useEffect(() => { localStorage.setItem('yaja_students', JSON.stringify(students)); }, [students]);
      useEffect(() => { localStorage.setItem('yaja_webhook', webhookUrl); }, [webhookUrl]);
      useEffect(() => { localStorage.setItem('yaja_logs', JSON.stringify(logs)); }, [logs]);

      // 컴포넌트 마운트 시 스캐너 라이브러리 준비 완료
      useEffect(() => {
        setScannerReady(true);
      }, []);

      // --- 1. 스캐너 컴포넌트 ---
      const ScannerView = () => {
        const lastScannedRef = useRef(null); // 무한 렌더링 방지를 위해 useRef 사용

        // 삑 소리 재생 함수 (웹 오디오 API 활용)
        const playBeep = () => {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gainNode = ctx.createGain();
            osc.connect(gainNode);
            gainNode.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime); // 880Hz (높은 음)
            gainNode.gain.setValueAtTime(0.1, ctx.currentTime); // 볼륨 조절
            osc.start();
            osc.stop(ctx.currentTime + 0.1); // 0.1초 동안 재생
          } catch (e) {
            console.log("오디오 재생을 지원하지 않는 기기입니다.");
          }
        };

        useEffect(() => {
          if (!scannerReady) return;
          
          // 반응형 스캐너 크기 설정 (모바일 화면 짤림 방지)
          const qrboxFunction = function(viewfinderWidth, viewfinderHeight) {
            let minEdgePercentage = 0.7; // 화면의 70% 크기
            let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
            let qrboxSize = Math.floor(minEdgeSize * minEdgePercentage);
            return { width: qrboxSize, height: qrboxSize };
          };

          const scanner = new window.Html5QrcodeScanner("qr-reader", { 
            fps: 10, 
            qrbox: qrboxFunction,
            aspectRatio: 1.0 
          }, false);

          const onScanSuccess = (decodedText) => {
            const now = Date.now();
            const last = lastScannedRef.current;
            
            // 3초 내 중복 스캔 방지
            if (last && last.text === decodedText && (now - last.time < 3000)) return; 
            lastScannedRef.current = { text: decodedText, time: now };

            try {
              const [studentId, studentName] = decodedText.split('|');
              
              // 올바르지 않은 QR 코드를 찍었을 때 처리
              if (!studentId || !studentName) {
                showScanMessage('error', '본 시스템용 출석 QR코드가 아닙니다.');
                return;
              }
              
              // 정상 스캔 시 삑 소리 재생 및 출석 처리
              playBeep();
              handleAttendance(studentId, studentName);
            } catch {
              showScanMessage('error', '잘못된 형식의 QR 코드입니다.');
            }
          };

          scanner.render(onScanSuccess, () => {});
          return () => scanner.clear().catch(console.error);
        }, []);

        const handleAttendance = (id, name) => {
          const now = new Date();
          const timeString = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
          
          setLogs(prevLogs => {
            const todayLogs = prevLogs.filter(log => log.id === id && log.timestamp.toDateString() === now.toDateString());
            const latestLog = todayLogs.length > 0 ? todayLogs[0] : null;
            const actionType = (latestLog && latestLog.type === '입실') ? '퇴실' : '입실';

            const newLog = { logId: Date.now().toString(), timestamp: now, id, name, type: actionType, timeString };

            if (webhookUrl) {
              const url = `${webhookUrl}?id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&type=${encodeURIComponent(actionType)}`;
              fetch(url, { mode: 'no-cors' }).catch(err => console.error('구글시트 전송 실패', err));
            }

            showScanMessage(actionType === '입실' ? 'success' : 'info', `[${actionType}] ${id} ${name} (${timeString})`);
            return [newLog, ...prevLogs];
          });
        };

        const showScanMessage = (type, text) => {
          setScanMessage({ type, text });
          setTimeout(() => setScanMessage(null), 3000);
        };

        return (
          <div className="flex flex-col items-center justify-center space-y-4">
            <h2 className="text-xl font-bold text-gray-800 mb-2">QR 출석 스캐너</h2>
            {scanMessage && (
              <div className={`px-6 py-4 rounded-lg shadow-lg text-white font-bold text-lg animate-bounce ${
                scanMessage.type === 'success' ? 'bg-green-500' : scanMessage.type === 'info' ? 'bg-blue-500' : 'bg-red-500'
              }`}>
                {scanMessage.text}
              </div>
            )}
            <div id="qr-reader" className="w-full max-w-md overflow-hidden rounded-lg shadow-md bg-white border-2 border-gray-200"></div>
            {webhookUrl ? (
              <p className="text-green-600 font-medium flex items-center"><span className="mr-1">☁️</span> 구글 시트와 실시간 연동 중입니다.</p>
            ) : (
              <p className="text-red-500 font-medium">환경설정에서 구글 시트를 연동하면 모든 교사가 실시간으로 볼 수 있습니다.</p>
            )}
          </div>
        );
      };

      // --- 2. 출석 기록 및 엑셀 다운로드 ---
      const AttendanceLogView = () => {
        const [filterDate, setFilterDate] = useState('');
        const [filterGrade, setFilterGrade] = useState('all');
        const [filterClass, setFilterClass] = useState('all');
        const [searchQuery, setSearchQuery] = useState('');

        const filteredLogs = logs.filter(log => {
          if (filterDate) {
            const logDateStr = `${log.timestamp.getFullYear()}-${String(log.timestamp.getMonth() + 1).padStart(2, '0')}-${String(log.timestamp.getDate()).padStart(2, '0')}`;
            if (logDateStr !== filterDate) return false;
          }
          let grade = '', classNum = '';
          if (log.id && log.id.length >= 4) {
             grade = log.id.substring(0, 1);
             classNum = parseInt(log.id.substring(1, 3), 10).toString();
          }
          if (filterGrade !== 'all' && grade !== filterGrade) return false;
          if (filterClass !== 'all' && classNum !== filterClass) return false;
          if (searchQuery && !log.name.includes(searchQuery) && !log.id.includes(searchQuery)) return false;
          return true;
        });

        const exportToCSV = () => {
          if (filteredLogs.length === 0) return alert('다운로드할 기록이 없습니다.');
          const headers = ['날짜', '시간', '학번', '이름', '상태'];
          const csvRows = filteredLogs.map(log => `${log.timestamp.toLocaleDateString('ko-KR')},${log.timeString},${log.id},${log.name},${log.type}`);
          const csvContent = "\ufeff" + [headers.join(','), ...csvRows].join('\n');
          const link = document.createElement('a');
          link.href = URL.createObjectURL(new Blob([csvContent], { type: 'text/csv;charset=utf-8;' }));
          link.download = `야자출석기록_${filterDate || new Date().toLocaleDateString('ko-KR').replace(/\. /g, '').replace(/\./g, '')}.csv`;
          link.click();
        };

        return (
          <div className="bg-white rounded-lg shadow-sm border border-gray-200 overflow-hidden">
            <div className="p-4 bg-gray-50 border-b border-gray-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
              <h2 className="text-lg font-bold text-gray-800 flex items-center">
                <span className="text-xl mr-2">🕒</span> 출석 기록 상세 조회
              </h2>
              <button onClick={exportToCSV} className="flex items-center bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 transition font-medium text-sm shadow-sm">
                <span className="mr-2">📥</span> 현재 목록 엑셀 다운로드
              </button>
            </div>
            
            <div className="p-4 border-b border-gray-200 bg-white grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4">
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">📅</span> 날짜 선택</label>
                <input type="date" value={filterDate} onChange={e => setFilterDate(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔽</span> 학년</label>
                <select value={filterGrade} onChange={e => setFilterGrade(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500">
                  <option value="all">전체 학년</option>
                  <option value="1">1학년</option><option value="2">2학년</option><option value="3">3학년</option>
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔽</span> 반</label>
                <select value={filterClass} onChange={e => setFilterClass(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500">
                  <option value="all">전체 반</option>
                  {[...Array(15)].map((_, i) => <option key={i+1} value={String(i+1)}>{i+1}반</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-600 mb-1 flex items-center"><span className="mr-1">🔍</span> 학생 검색</label>
                <input type="text" placeholder="이름 또는 학번" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-indigo-500" />
              </div>
            </div>

            <div className="bg-indigo-50 p-2 px-4 text-sm text-indigo-800 flex justify-between items-center border-b border-gray-200">
              <span>조회 결과: <strong>{filteredLogs.length}</strong>건</span>
              <button onClick={() => {setFilterDate(''); setFilterGrade('all'); setFilterClass('all'); setSearchQuery('');}} className="text-indigo-600 hover:text-indigo-800 hover:underline font-medium text-xs">필터 초기화</button>
            </div>
            
            <div className="overflow-x-auto max-h-[400px] overflow-y-auto">
              <table className="w-full text-left border-collapse">
                <thead className="sticky top-0 bg-gray-100 shadow-sm z-10">
                  <tr className="text-gray-600 text-sm uppercase tracking-wider">
                    <th className="p-4 border-b">시간</th><th className="p-4 border-b">학번</th><th className="p-4 border-b">이름</th><th className="p-4 border-b">상태</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredLogs.length === 0 ? (
                    <tr><td colSpan="4" className="p-8 text-center text-gray-500">조건에 맞는 출석 기록이 없습니다.</td></tr>
                  ) : (
                    filteredLogs.map(log => (
                      <tr key={log.logId} className="hover:bg-gray-50 border-b border-gray-100 transition">
                        <td className="p-4 text-gray-700 whitespace-nowrap">{log.timestamp.toLocaleDateString()} {log.timeString}</td>
                        <td className="p-4 font-mono text-gray-600 whitespace-nowrap">{log.id}</td>
                        <td className="p-4 font-medium text-gray-900 whitespace-nowrap">{log.name}</td>
                        <td className="p-4 whitespace-nowrap">
                          <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${log.type === '입실' ? 'bg-green-100 text-green-800' : 'bg-blue-100 text-blue-800'}`}>
                            <span className="mr-1">{log.type === '입실' ? '✅' : '🏃'}</span> {log.type}
                          </span>
                        </td>
                      </tr>
                    ))
                  )}
                </tbody>
              </table>
            </div>
          </div>
        );
      };

      // --- 3. 학생 관리 ---
      const StudentManagementView = () => {
        const [newId, setNewId] = useState('');
        const [newName, setNewName] = useState('');

        const addStudent = (e) => {
          e.preventDefault();
          if (!newId || !newName) return;
          if (students.find(s => s.id === newId)) return alert('이미 존재하는 학번입니다.');
          setStudents([...students, { id: newId, name: newName }]);
          setNewId(''); setNewName('');
        };
        const removeStudent = (id) => setStudents(students.filter(s => s.id !== id));

        return (
          <div className="space-y-6">
            <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
              <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center">
                <span className="text-xl mr-2">👤</span> 개별 학생 등록 및 QR 생성
              </h2>
              <form onSubmit={addStudent} className="flex gap-4">
                <input type="text" placeholder="학번 (예: 10101)" value={newId} onChange={(e) => setNewId(e.target.value)} className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" />
                <input type="text" placeholder="이름 (예: 홍길동)" value={newName} onChange={(e) => setNewName(e.target.value)} className="flex-1 p-2 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500" />
                <button type="submit" className="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-medium">등록 및 발급</button>
              </form>
            </div>

            <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
              <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center"><span className="text-xl mr-2">🔲</span> 학생 QR 코드 목록</h2>
              <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                {students.map(student => (
                  <div key={student.id} className="border border-gray-200 rounded-lg p-4 flex flex-col items-center bg-gray-50 relative hover:shadow-md transition">
                    <button onClick={() => removeStudent(student.id)} className="absolute top-2 right-2 text-gray-400 hover:text-red-500 text-xs font-bold">삭제</button>
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(`${student.id}|${student.name}`)}`} alt="QR" className="w-32 h-32 mb-3 bg-white p-2 border rounded shadow-sm" />
                    <p className="font-bold text-gray-800 text-lg">{student.name}</p>
                    <p className="text-gray-500 text-sm font-mono">{student.id}</p>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      };

      // --- 4. 환경설정 ---
      const SettingsView = () => (
        <div className="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
          <h2 className="text-lg font-bold text-gray-800 mb-4 flex items-center"><span className="text-xl mr-2">⚙️</span> 구글 시트 웹앱 URL 연동</h2>
          <p className="text-gray-600 mb-4 text-sm leading-relaxed">구글 앱스 스크립트 웹앱 URL을 입력하세요. 이후 스캔 기록이 교사 단톡방 등에서 실시간 공유 가능한 시트에 자동 기록됩니다.</p>
          <input type="text" placeholder="https://script.google.com/macros/s/..." value={webhookUrl} onChange={(e) => setWebhookUrl(e.target.value)} className="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 mb-2" />
          {webhookUrl && <p className="text-green-600 text-sm font-bold">✅ 연결 완료! 실시간 전송이 활성화되었습니다.</p>}
        </div>
      );

      return (
        <div className="min-h-screen bg-gray-100 font-sans text-gray-900 pb-10">
          <header className="bg-indigo-600 text-white shadow-md">
            <div className="max-w-5xl mx-auto px-4 py-6 flex items-center justify-between">
              <h1 className="text-2xl font-extrabold tracking-tight flex items-center"><span className="text-3xl mr-3">🔲</span> 야간자율학습 출석 시스템 Pro</h1>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 py-8 flex flex-col md:flex-row gap-8">
            <nav className="w-full md:w-64 flex-shrink-0 space-y-2">
              {[
                { id: 'scanner', icon: '📷', label: '출석 스캐너 (카메라)' },
                { id: 'students', icon: '👥', label: '학생 관리 및 발급' },
                { id: 'logs', icon: '🕒', label: '출석 기록 및 엑셀' },
                { id: 'settings', icon: '⚙️', label: '클라우드 연동' }
              ].map((tab) => (
                <button 
                  key={tab.id} onClick={() => setActiveTab(tab.id)}
                  className={`w-full flex items-center p-4 rounded-lg transition-colors font-medium ${activeTab === tab.id ? 'bg-indigo-100 text-indigo-700 shadow-sm' : 'text-gray-600 hover:bg-gray-200'}`}
                >
                  <span className="text-xl mr-3">{tab.icon}</span> {tab.label}
                </button>
              ))}
            </nav>
            <section className="flex-1">
              {activeTab === 'scanner' && <ScannerView />}
              {activeTab === 'students' && <StudentManagementView />}
              {activeTab === 'logs' && <AttendanceLogView />}
              {activeTab === 'settings' && <SettingsView />}
            </section>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
